<!DOCTYPE html>
<html>
<head>
    <title>Student Course Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            animation: fadeDown 1s ease-in-out;
        }

        header h1 {
            font-size: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: white;
            color: black;
            width: 280px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: translateY(50px);
            opacity: 0;
            animation: fadeUp 0.8s forwards;
        }

        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.4s; }
        .card:nth-child(3) { animation-delay: 0.6s; }

        .card h3 {
            margin-top: 0;
        }

        .back-btn {
            display: block;
            margin: 40px auto;
            padding: 12px 25px;
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #eee;
            transform: scale(1.05);
        }

        @keyframes fadeUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeDown {
            from {
                transform: translateY(-40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Student Course Management</h1>
    <p>Explore available courses with a modern UI experience</p>
</header>

<div class="container">
    <div class="card">
        <h3>Full Stack Development</h3>
        <p>Learn frontend and backend technologies.</p>
    </div>

    <div class="card">
        <h3>Data Structures</h3>
        <p>Master algorithms and problem-solving skills.</p>
    </div>

    <div class="card">
        <h3>Cloud Computing</h3>
        <p>Understand AWS, Azure and deployment strategies.</p>
    </div>
</div>

<button class="back-btn" onclick="goBack()">Back to Job Portal</button>

<script>
function goBack() {
    window.location.href = "https://your-job-portal-url.onrender.com";
}
</script>

</body>
</html>
